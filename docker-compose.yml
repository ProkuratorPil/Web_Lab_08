services:
  mongo:
    image: mongo:7
    container_name: wp_labs_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-student}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD:-student_secure_password}
      MONGO_INITDB_DATABASE: ${DB_NAME:-wp_labs}
    ports:
      - "27017:27017"
    volumes:
      - wp_labs_mongo:/data/db
    networks:
      - wp_labs_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wp_labs_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - wp_labs_redis:/data
    networks:
      - wp_labs_network
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password_change_in_prod} --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_secure_password_change_in_prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: wp_labs_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-student}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-student_secure_rabbit_pass_change_in_prod}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - wp_labs_rabbitmq:/var/lib/rabbitmq
    networks:
      - wp_labs_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: wp_labs_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_secure_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - wp_labs_minio:/data
    networks:
      - wp_labs_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wp_labs_app
    restart: unless-stopped
    environment:
      # MongoDB (inside Docker - use service name)
      MONGO_URI: "mongodb://${DB_USER:-student}:${DB_PASSWORD:-student_secure_password}@mongo:27017/${DB_NAME:-wp_labs}?authSource=admin"
      
      PORT: 4200
      NODE_ENV: ${NODE_ENV:-development}
      
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-super_secret_access_key_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_prod}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      
      # Redis (inside Docker - use service name)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password_change_in_prod}
      CACHE_TTL_DEFAULT: ${CACHE_TTL_DEFAULT:-300}
      
      # OAuth
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      YANDEX_CALLBACK_URL: ${YANDEX_CALLBACK_URL:-http://localhost:4200/auth/oauth/yandex/callback}
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      VK_CALLBACK_URL: ${VK_CALLBACK_URL:-http://localhost:4200/auth/oauth/vk/callback}

      # RabbitMQ (inside Docker - use service name)
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-student}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-student_secure_rabbit_pass_change_in_prod}
      QUEUE_USER_REGISTERED: ${QUEUE_USER_REGISTERED:-wp.auth.user.registered}

      # SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-true}

      # MinIO (inside Docker - use service name)
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_secure_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-wp-labs-files}
      MINIO_USE_SSL: "false"
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    ports:
      - "4200:4200"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - wp_labs_network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: wp_labs_redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - wp_labs_redisinsight:/data
    networks:
      - wp_labs_network
    depends_on:
      - redis

volumes:
  wp_labs_mongo:
  wp_labs_redis:
  wp_labs_redisinsight:
  wp_labs_minio:
  wp_labs_rabbitmq:

networks:
  wp_labs_network: